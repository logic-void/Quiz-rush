<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
        <title>Quiz Rush</title>
    </head>
    <body>
        <div class="popup-container"></div>
        <div class="screen active" id="start-screen">
            <h1>Quiz Rush</h1>
            <p>By Maaltin's Billa</p>
            <label id="options-dropdown" for="options-dropdown">
                <div>
                    Select a Category:
                    <div id="category-text">General Knowledge ⌵</div>
                </div>
                <div class="option-container">
                    <div class="option">General Knowledge</div>
                    <div class="option">Books</div>
                    <div class="option">Film</div>
                    <div class="option">Music</div>
                    <div class="option">Television</div>
                    <div class="option">Video Games</div>
                    <div class="option">Board Games</div>
                    <div class="option">Science & Nature</div>
                    <div class="option">Science: Computers</div>
                    <div class="option">Science: Mathematics</div>
                    <div class="option">Mythology</div>
                    <div class="option">Sports</div>
                    <div class="option">Geography</div>
                    <div class="option">History</div>
                    <div class="option">Politics</div>
                    <div class="option">Arts</div>
                    <div class="option">Celebrities</div>
                    <div class="option">Animals</div>
                    <div class="option">Vehicles</div>
                    <div class="option">Comics</div>
                    <div class="option">Gadgets</div>
                    <div class="option">Anime & Manga</div>
                    <div class="option">Cartoon & Animations</div>
                </div>
            </label>
            <label for="difficulty-dropdown" id="difficulty-dropdown">
                <div>
                    Select a Difficulty:
                    <div id="difficulty-text">Mixed ⌵</div>
                </div>
                <div class="difficulty-container">
                    <div class="difficulty">Easy</div>
                    <div class="difficulty">Medium</div>
                    <div class="difficulty">Hard</div>
                    <div class="difficulty">Mixed</div>
                </div>
            </label>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div class="screen" id="quiz-screen">
            <p id="timer-text">Timer :</p>
            <h2>Question: <span id="question-text"></span></h2>
            <div class="question-info">
                <p><span id="question-track"></span> out of 10</p>
                <p>Score: <span id="score-text"></span></p>
            </div>
            <div class="progress-bar"><div class="progress"></div></div>
            <p class="difficulty-tracker">
                Difficulty: <span id="questionDifficulty"></span>
            </p>
            <div class="button-container"></div>
        </div>
        <div class="screen" id="end-screen">
            <h2 id="result-text">good job</h2>
            <p>final score: <span id="final-score"></span></p>
            <p>High score: <span id="high-score"></span></p>
            <button id="restart-btn">Restart Quiz</button>
        </div>
        <audio src="assets/correct.mp3" id="correct-audio"></audio>
        <audio src="assets/incorrect.mp3" id="incorrect-audio"></audio>
        <script src="script.js"></script>
    </body>
</html>
